# Phase Gate Policy Configuration
# 
# Defines the requirements for advancing through workflow phases.
# This file is the source of truth for phase transitions.
#
# Usage:
#   import { loadPhaseGatePolicy } from './phase-gate-policy.ts';
#   const policy = loadPhaseGatePolicy();
#
# Phase Flow:
#   discovery → design → implementation → test → integration → deploy-check → acceptance

version: "1.0"

# Default thresholds for all phases
defaults:
  min_reason_length: 10
  max_retry_count: 3

# Phase definitions
phases:
  # ============================================================
  # Discovery Phase
  # ============================================================
  discovery:
    description: "Initial research and requirement gathering"
    advance_to: design
    
    requirements:
      # No specific role required for discovery
      min_findings: 3
      min_evidence: 1
      completed_child_roles: []
      min_child_done: 0
      
      # Evidence type preferences for discovery
      allowed_evidence_types:
        - web
        - blog
        - agent-output
      
      # Minimum rating for findings (average)
      min_finding_rating: "★★"
    
    output_contract:
      required_findings: 3
      required_evidence: 1
      description: "Clear understanding of requirements and initial analysis"
    
    # Discovery can be skipped for simple tasks
    can_skip: false

  # ============================================================
  # Design Phase
  # ============================================================
  design:
    description: "Architecture and detailed design"
    advance_to: implementation
    
    requirements:
      # Requires research completion
      min_findings: 3
      min_evidence: 1
      completed_child_roles:
        - research-agent
      min_child_done: 1
      
      allowed_evidence_types:
        - web
        - file
        - command
        - agent-output
      
      min_finding_rating: "★★"
    
    output_contract:
      required_findings: 3
      required_evidence: 1
      description: "Architecture decisions, module boundaries, API contracts"
    
    can_skip: false

  # ============================================================
  # Implementation Phase
  # ============================================================
  implementation:
    description: "Code implementation"
    advance_to: test
    
    requirements:
      # Requires code-agent completion
      min_findings: 2
      min_evidence: 2
      completed_child_roles:
        - code-agent
      min_child_done: 1
      
      allowed_evidence_types:
        - file
        - command
        - agent-output
      
      min_finding_rating: "★★★"
    
    output_contract:
      required_findings: 2
      required_evidence: 2
      description: "Working code with tests"
    
    can_skip: false

  # ============================================================
  # Test Phase
  # ============================================================
  test:
    description: "Testing and quality assurance"
    advance_to: integration
    
    requirements:
      # Requires test-agent completion
      min_findings: 2
      min_evidence: 2
      completed_child_roles:
        - test-agent
      min_child_done: 1
      
      allowed_evidence_types:
        - file
        - command
        - agent-output
      
      min_finding_rating: "★★★"
    
    output_contract:
      required_findings: 2
      required_evidence: 2
      description: "Test coverage, quality metrics"
    
    can_skip: false

  # ============================================================
  # Integration Phase
  # ============================================================
  integration:
    description: "Integration and system testing"
    advance_to: deploy-check
    
    requirements:
      # Requires both code and test completion
      min_findings: 1
      min_evidence: 2
      completed_child_roles:
        - code-agent
        - test-agent
      min_child_done: 2
      
      allowed_evidence_types:
        - file
        - command
        - agent-output
      
      min_finding_rating: "★★★"
    
    output_contract:
      required_findings: 1
      required_evidence: 2
      description: "Integrated system ready for deployment"
    
    can_skip: false

  # ============================================================
  # Deploy Check Phase
  # ============================================================
  deploy-check:
    description: "Deployment readiness verification"
    advance_to: acceptance
    
    requirements:
      # Requires ops-agent completion
      min_findings: 1
      min_evidence: 1
      completed_child_roles:
        - ops-agent
      min_child_done: 1
      
      allowed_evidence_types:
        - file
        - command
        - agent-output
      
      min_finding_rating: "★★★"
    
    output_contract:
      required_findings: 1
      required_evidence: 1
      description: "Deployment checklist verified"
    
    can_skip: false

  # ============================================================
  # Acceptance Phase (Terminal)
  # ============================================================
  acceptance:
    description: "Final review and acceptance"
    advance_to: acceptance
    
    requirements:
      # Final validation - all previous phases must be complete
      min_findings: 0
      min_evidence: 0
      completed_child_roles: []
      min_child_done: 0
      
      # Acceptance requires explicit user sign-off
      requires_user_approval: true
    
    output_contract:
      required_findings: 0
      required_evidence: 0
      description: "User acceptance confirmed"
    
    can_skip: false
    terminal: true

# ============================================================
# Exception Routing Matrix
# ============================================================
# Maps failure types to appropriate specialist roles
exception_routing:
  impl-bug:
    delegate_to: code-agent
    priority: high
    description: "Implementation bug requires code-agent fix"
  
  test-failure:
    delegate_to: test-agent
    priority: high
    description: "Test failure requires test-agent investigation"
  
  integration-mismatch:
    delegate_to: integration-agent
    priority: high
    description: "Integration issue requires integration-agent"
  
  deploy-config-error:
    delegate_to: ops-agent
    priority: high
    description: "Deployment config requires ops-agent"
  
  requirement-gap:
    delegate_to: pm-agent
    priority: medium
    description: "Missing requirements requires pm-agent clarification"
  
  environment-issue:
    delegate_to: ops-agent
    priority: medium
    description: "Environment issue requires ops-agent"
  
  security-concern:
    delegate_to: security-agent
    priority: high
    description: "Security concern requires security-agent review"

# ============================================================
# Allowed Roles Registry
# ============================================================
roles:
  code-agent:
    description: "Implements features and fixes bugs"
    skills:
      - "@runbook-org"
    output_types:
      - file
      - command
  
  test-agent:
    description: "Writes and runs tests"
    skills:
      - "@runbook-org"
    output_types:
      - file
      - command
  
  ops-agent:
    description: "Handles deployment and infrastructure"
    skills:
      - "@runbook-org"
    output_types:
      - command
      - agent-output
  
  research-agent:
    description: "Conducts research and analysis"
    skills:
      - "@runbook-org"
    output_types:
      - web
      - agent-output
  
  integration-agent:
    description: "Handles system integration"
    skills:
      - "@runbook-org"
    output_types:
      - file
      - command
  
  pm-agent:
    description: "Manages requirements and priorities"
    skills:
      - "@runbook-org"
    output_types:
      - agent-output
  
  arch-agent:
    description: "Designs system architecture"
    skills:
      - "@runbook-org"
    output_types:
      - file
      - agent-output
  
  security-agent:
    description: "Reviews security concerns"
    skills:
      - "@runbook-org"
    output_types:
      - agent-output
